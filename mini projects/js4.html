<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script>
        function f(){
          var x=document.getElementById('i').value;
        //   1.Display the obtained value   
          alert(x);

        //  2.Display square  
        alert(`square of the number is ${x**2}`)

        //  3.Display Factorial  
          var fact=1;
          for(let i=1;i<=x;i++){
            fact*=i;
          }
          alert(`Factorial is ${fact}`)
        document.getElementById('h').innerHTML=`Factorial is ${fact}`;
        
        }
    </script>
</head>
<body class="bg-secondary">
    <div class="container w-75 mt-5 p-5">
    <input type="number" placeholder="Enter a number" class="form-control" id="i">    
    <button class="btn btn-danger mt-3" onclick="f()">CLICK</button>
    <h1 id="h"></h1>
    </div>
</body>
</html>
