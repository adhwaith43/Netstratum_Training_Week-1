<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Counter App</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">

        <script>
        x=0;
        function a(){
            x++;
            document.getElementById("c").innerHTML=x
        }

        function s(){
            if (x!=0){
            x--;
            document.getElementById("c").innerHTML=x
            }
        }
        function r(){
            x=0;
            document.getElementById("c").innerHTML=x
        }
    </script>
    </head>
    <body class="bg-secondary">
        <div class="container w-75 mt-5 p-5 text-center">

            <h1 class="text-warning mt-5">Counter App</h1>
            <h3 id="c" class="mt-5 display-1">0</h3>
            <div class="d-flex justify-content-center gap-5 mt-5">
                <button onclick="a()" class="btn btn-lg btn-danger mt-3 btn-">+</button>
                <button onclick="s()" class="btn btn-lg btn-primary mt-3">-</button>
                <button onclick="r()"
                    class="btn btn-lg btn-warning mt-3">Reset</button>
            </div>
        </div>
    </body>
</html>
