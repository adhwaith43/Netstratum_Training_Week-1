<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script>
        function a(){
          var x=document.getElementById('i').value;
          var y=document.getElementById('j').value;
          let res=Number(x)+Number(y);
          document.getElementById('h').innerHTML=`Result is ${res}`
        
        }
        function s(){
          var x=document.getElementById('i').value;
          var y=document.getElementById('j').value;
          let res=Number(x)-Number(y);
          document.getElementById('h').innerHTML=`Result is ${res}`
        
        }
        function m(){
          var x=document.getElementById('i').value;
          var y=document.getElementById('j').value;
          let res=Number(x)*Number(y);
          document.getElementById('h').innerHTML=`Result is ${res}`

        }
        function d(){
          var x=document.getElementById('i').value;
          var y=document.getElementById('j').value;
          let res=Number(x)/Number(y);
          document.getElementById('h').innerHTML=`Result is ${res}`
        }
    </script>
</head>
<body class="bg-secondary">
    <div class="container w-75 mt-5 p-5 text-center">
    <input type="number" placeholder="Enter a number" class="form-control" id="i">
    <input type="number" placeholder="Enter a number" class="form-control mt-5" id="j">
    
    <div class="container w-75 p-5 d-flex justify-content-center gap-3"> 
    <button class="btn btn-danger mt-3" onclick="a()">+</button>
    <button class="btn btn-danger mt-3" onclick="s()">-</button>
    <button class="btn btn-danger mt-3" onclick="m()">*</button>
    <button class="btn btn-danger mt-3" onclick="d()">/</button>
    </div>
    <h1 class="mt-5 "id="h"></h1>
    </div> 
</body>
</html>
