<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />
        <script>
            function f(){
                var fruit= document.getElementById("inputGroupSelect01").value;
                switch(fruit){
                    case 'banana':
                        document.getElementById('r').innerHTML=100;
                        break;
                    case 'orange':
                        document.getElementById('r').innerHTML=80;
                        break;
                    case 'grapes':
                        document.getElementById('r').innerHTML=60;
                        break;
                    case 'pineapple':
                        document.getElementById('r').innerHTML=110;
                        break;
                    default :
                        document.getElementById('r').innerHTML="No Fruit";
                        break;
                }
            }
        </script>
    </head>
    <body class="bg-secondary">
       <div class="container w-75 mt-5 p-5">

            <div class="input-group mb-3 mt-5">
                <label class="input-group-text"
                    for="inputGroupSelect01">Fruit Name</label>
                <select class="form-select" id="inputGroupSelect01">
                    <option selected>Choose...</option>
                    <option value="banana">Banana</option>
                    <option value="orange">Orange</option>
                    <option value="grapes">Grapes</option>
                    <option value="pineapple">Pineapple</option>
                </select>
            </div>
            <!-- <div class="d-flex justify-content-space-evenly">
                <button class="btn btn-primary btn-lg" onclick="f()"> Check Price</button>
                <h2 id="r"></h2>

            </div> -->
            <div class="row">
                <div class="col-6"><button class="btn btn-primary btn-lg" onclick="f()"> Check Price</button></div>
                <div class="col-6"><input type="text" placeholder="price" id="r"></div>
            </div>
       </div>

    </body>
</html>
