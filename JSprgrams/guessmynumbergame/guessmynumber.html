<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
            rel="stylesheet">
        <script type="text/javascript" src="scripts.js"></script>
        <style>
        body{
            font-family: "Press Start 2P", system-ui;
            font-weight: 400;
            font-style: normal;
        }

    </style>
    </head>

    <body style="background-color: rgb(45, 42, 40);" class="text-light">

        <header>
            <div class="d-flex justify-content-between m-3">
                <button id="reset"
                    class="btn btn-light fs-4 fw-bold p-3" onclick="again()">Again!</button>
                <p class="fs-4 fw-bold mt-2"> (Between 1 and 20)</p>
            </div>

        </header>

        <div class="text-center">
            <h1 class="fw-bolder text-center mt-5">Guess My Number</h1>
            <button class="btn btn-light fs-2 fw-bold p-4 mt-5" id="b">?</button>
        </div>

        <div class="container w-75 mt-5">
            <div class="row mt-5">
                <div class="col-6 text-center">
                    <input type="text"
                        class="border:border-5 border-light py-5 text-light text-center" style="background-color:rgb(45, 42, 40);" id="g">
                    <br>
                    <button onclick="check()"
                        class="btn btn-light fs-4 fw-bold p-3 mt-3">Check!</button>
                </div>

                <div class="col-6 d-flex justify-content-center">
                    <div>
                    <p id="result">Start guessing.....</p>
                    <p> Score: <span id="score"></span></p>
                    <p> Highscore: <span id="Highscore">0</span></p>
                    </div>
                </div>

            </div>

        </div>
    </body>
</html>
